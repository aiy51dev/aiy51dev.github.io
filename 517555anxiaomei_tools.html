<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>科技安小妹工具箱 · 分享版</title>
    <style>
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0A0E2A 0%, #1A0B3A 50%, #0D1B3E 100%);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            padding: 40px 24px;
            color: #E0E6F0;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 静态网格背景 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .grid-bg::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
        }
        /* 透视地平线网格 */
        .grid-bg::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 250%;
            height: 55%;
            background-image: 
                linear-gradient(90deg, rgba(138, 43, 226, 0.10) 1px, transparent 1px),
                linear-gradient(0deg, rgba(0, 255, 255, 0.10) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: translateX(-50%) perspective(500px) rotateX(58deg);
            transform-origin: bottom center;
            mask-image: linear-gradient(to top, rgba(0,0,0,0.35) 0%, transparent 100%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.35) 0%, transparent 100%);
        }

        /* 光晕粒子 */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
            opacity: 0.25;
        }
        .glow-orb-1 { width: 400px; height: 400px; top: -100px; right: -150px; background: radial-gradient(circle, #00FFFF 0%, transparent 70%); }
        .glow-orb-2 { width: 350px; height: 350px; bottom: 5%; left: -120px; background: radial-gradient(circle, #FF00FF 0%, transparent 70%); }
        .glow-orb-3 { width: 300px; height: 300px; top: 40%; left: 50%; background: radial-gradient(circle, #8A2BE2 0%, transparent 70%); }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1480px;
            margin: 0 auto;
            background: rgba(15, 20, 50, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.08), 0 0 120px rgba(138, 43, 226, 0.06), inset 0 1px 0 rgba(255,255,255,0.05);
            overflow: hidden;
            padding: 0 0 36px 0;
            border: 1px solid rgba(0, 255, 255, 0.25);
        }

        .hero-image-panel {
            background: linear-gradient(135deg, #0b1120 0%, #121a35 50%, #0f1830 100%);
            padding: 20px 32px 20px 32px;
            border-bottom: 2px solid rgba(0, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .hero-image-panel::before {
            content: "";
            position: absolute;
            top: -30%;
            right: -10%;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.18) 0%, rgba(138, 43, 226, 0.08) 50%, rgba(0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero-image-panel::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, #00FFFF 20%, #FF00FF 50%, #00FFFF 80%, transparent 100%);
            pointer-events: none;
        }

        .image-upload-area {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 16px;
            justify-content: space-between;
        }

        .title-side {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1 1 auto;
            min-width: 0;
        }

        .tech-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(120deg, #00FFFF, #8A2BE2, #FF00FF);
            background-size: 200% 200%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: titleGlow 4s ease-in-out infinite;
            letter-spacing: 1px;
            border-right: 2px solid #00FFFF;
            padding-right: 16px;
            margin-right: 8px;
            white-space: nowrap;
            text-shadow: 0 0 30px rgba(0,255,255,0.3);
        }
        @keyframes titleGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .tech-sub {
            font-size: 0.8rem;
            color: #00FFFF;
            background: rgba(0, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 60px;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            text-shadow: 0 0 8px rgba(0,255,255,0.4);
        }

        .image-preview {
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.9);
            border-radius: 28px;
            padding: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15), 0 4px 12px rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        .image-preview:hover {
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), 0 4px 20px rgba(138, 43, 226, 0.2);
            transform: translateY(-2px);
        }

        .image-preview img {
            max-width: 180px;
            max-height: 85px;
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            background: #fff;
            object-fit: contain;
            transition: transform 0.2s;
        }

        .upload-btn {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(138, 43, 226, 0.15));
            color: #00FFFF;
            border: 1px solid rgba(0, 255, 255, 0.4);
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }
        .upload-btn:hover {
            background: rgba(0, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.25);
            border-color: #00FFFF;
        }

        .info-panel {
            background: rgba(15, 20, 50, 0.7);
            backdrop-filter: blur(8px);
            margin: 20px 28px;
            padding: 20px 28px;
            border-radius: 32px;
            border-left: 4px solid #00FFFF;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.08), inset 0 1px 0 rgba(255,255,255,0.03);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-left: 4px solid #00FFFF;
        }
        .info-panel p {
            color: #B0C4DE;
            margin-bottom: 6px;
        }
        .info-panel strong {
            color: #FF69B4;
        }

        .wechat-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
            background: rgba(15, 20, 55, 0.85);
            padding: 10px 20px;
            border-radius: 80px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        .wechat-row span:first-child {
            color: #B0C4DE;
        }

        .wechat-id {
            font-weight: 800;
            font-size: 1.2rem;
            background: #0f172a;
            color: #00FFFF;
            padding: 5px 20px;
            border-radius: 40px;
            font-family: monospace;
            border: 1px solid rgba(0, 255, 255, 0.3);
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        .copy-btn {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(138, 43, 226, 0.15));
            border: 1px solid rgba(0, 255, 255, 0.4);
            color: #00FFFF;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: rgba(0, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .qrcode-area {
            margin-top: 20px;
            padding-top: 16px;
            text-align: center;
        }
        .qrcode-title {
            color: #00FFFF;
            font-weight: 600;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(0,255,255,0.3);
        }
        .qrcode-preview img {
            max-width: 120px;
            border-radius: 20px;
            background: white;
            padding: 6px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid rgba(0, 255, 255, 0.3);
        }
        .qrcode-preview img:hover {
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }
        .qrcode-tip {
            color: #FF69B4;
            font-size: 0.85rem;
            margin-top: 6px;
            text-shadow: 0 0 8px rgba(255,105,180,0.4);
        }

        .resource-manager {
            padding: 0 28px;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 24px 0 16px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #00FFFF, #FF69B4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            border-left: 4px solid #00FFFF;
            padding-left: 20px;
        }
        .warning-tip {
            font-size: 0.7rem;
            background: rgba(255, 0, 0, 0.15);
            color: #FF6B6B;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
            margin-left: 12px;
            white-space: nowrap;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        /* ===== 霓虹卡片列表样式 (图片风格) ===== */
        .resource-card-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 28px;
        }

        .resource-card {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 10px;
            background: linear-gradient(90deg, rgba(0, 180, 255, 0.12) 0%, rgba(200, 160, 255, 0.10) 40%, rgba(255, 130, 180, 0.08) 100%);
            border-radius: 30px;
            padding: 8px 16px 8px 8px;
            position: relative;
            border: 2px solid rgba(0, 255, 255, 0.5);
            box-shadow: 
                0 0 15px rgba(0, 255, 255, 0.15),
                0 0 30px rgba(138, 43, 226, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            cursor: default;
            overflow: visible;
        }
        .resource-card::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 32px;
            padding: 3px;
            background: linear-gradient(135deg, #00FFFF, #FF00FF, #8A2BE2, #00FFFF);
            background-size: 300% 300%;
            animation: borderGlow 4s ease-in-out infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .resource-card:hover {
            transform: translateX(4px);
            box-shadow: 
                0 0 25px rgba(0, 255, 255, 0.25),
                0 0 50px rgba(138, 43, 226, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        /* 顶部发光线条 */
        .resource-card::after {
            content: "";
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00FFFF, #FF00FF, #00FFFF, transparent);
            border-radius: 2px;
            filter: blur(3px);
            pointer-events: none;
        }

        /* 编号圆块 */
        .card-serial {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 56px;
            height: 36px;
            background: linear-gradient(135deg, #00BFFF, #8A2BE2);
            border-radius: 20px;
            color: #000;
            font-weight: 800;
            font-size: 0.95rem;
            letter-spacing: 1px;
            padding: 0 10px;
            border: 2px solid rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            flex-shrink: 0;
        }

        .card-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            gap: 10px;
            overflow: hidden;
        }
        .card-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: #E0E6F0;
            text-shadow: 0 0 6px rgba(0,255,255,0.2);
            white-space: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .card-disk {
            font-size: 0.68rem;
            color: #00FFFF;
            background: rgba(0, 255, 255, 0.10);
            padding: 2px 8px;
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .card-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            margin-left: auto;
        }

        .card-copy-btn {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(138, 43, 226, 0.2));
            color: #00FFFF;
            border: 1px solid rgba(0, 255, 255, 0.5);
            padding: 5px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.7rem;
            transition: 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .card-copy-btn:hover {
            background: rgba(0, 255, 255, 0.35);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        .card-edit-btn {
            background: transparent;
            color: #FF69B4;
            border: 1px solid rgba(255, 105, 180, 0.4);
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .card-edit-btn:hover {
            background: rgba(255, 105, 180, 0.2);
            box-shadow: 0 0 12px rgba(255, 105, 180, 0.2);
        }
        
        

        /* 添加资源表单模态框 */
        .add-resource-modal {
            display: none;
            position: fixed;
            z-index: 1200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 20, 0.92);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .add-resource-modal.active {
            display: flex;
        }

        .add-resource-card {
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 36px 40px;
            max-width: 520px;
            width: 92%;
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.15), 0 0 120px rgba(138, 43, 226, 0.1);
            position: relative;
        }

        .add-resource-card h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #00FFFF, #FF69B4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #00FFFF;
            margin-bottom: 8px;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(0,255,255,0.3);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 20px;
            font-size: 0.9rem;
            background: rgba(15, 20, 40, 0.85);
            color: #E0E6F0;
            transition: 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #00FFFF;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.25);
        }

        .form-group select option {
            background: #1a1a2e;
            color: #E0E6F0;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .form-actions button {
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid;
        }

        .form-confirm-btn {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.25), rgba(138, 43, 226, 0.25));
            color: #00FFFF;
            border-color: rgba(0, 255, 255, 0.5);
        }
        .form-confirm-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .form-cancel-btn {
            background: rgba(255, 107, 107, 0.15);
            color: #FF6B6B;
            border-color: rgba(255, 107, 107, 0.4);
        }
        .form-cancel-btn:hover {
            background: rgba(255, 107, 107, 0.3);
        }

        .close-modal-x {
            position: absolute;
            top: 20px;
            right: 28px;
            font-size: 28px;
            color: #00FFFF;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-modal-x:hover {
            color: #FF00FF;
            text-shadow: 0 0 15px rgba(255,0,255,0.5);
        }

        /* 表格保留（为兼容编辑模式）但默认隐藏 */
        .resource-table-wrapper {
            display: none;
        }

        /* ===== 原有表格样式保留备用 ===== */
        .resource-table-wrapper-old {
            overflow-x: auto;
            border-radius: 28px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            background: rgba(15, 20, 50, 0.7);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.08);
            margin-bottom: 28px;
        }

        .resource-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 980px;
            color: #E0E6F0;
        }

        .resource-table th {
            background: rgba(15, 20, 55, 0.9);
            padding: 16px 10px;
            text-align: left;
            font-weight: 700;
            color: #00FFFF;
            border-bottom: 2px solid rgba(0, 255, 255, 0.3);
            font-size: 0.85rem;
        }

        .resource-table td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
            vertical-align: middle;
        }

        .resource-table input, .resource-table select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(15, 20, 40, 0.8);
            color: #E0E6F0;
            transition: 0.2s;
        }

        .resource-table input:focus, .resource-table select:focus {
            border-color: #00FFFF;
            outline: none;
            box-shadow: 0 0 10px rgba(0,255,255,0.2);
        }

        .copy-link-btn {
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.4);
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.7rem;
            transition: 0.2s;
            color: #00FFFF;
        }
        .copy-link-btn:hover {
            background: rgba(0, 255, 255, 0.3);
        }

        .encrypt-hint {
            background: rgba(255, 105, 180, 0.1);
            font-size: 0.75rem;
            padding: 6px 12px;
            border-radius: 60px;
            display: inline-block;
            color: #FF69B4;
            font-weight: 500;
            border: 1px solid rgba(255, 105, 180, 0.3);
        }

        .delete-row-btn {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.4);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            color: #FF6B6B;
            transition: 0.2s;
        }
        .delete-row-btn:hover {
            background: rgba(255, 107, 107, 0.3);
        }

        .add-resource-btn {
            background: linear-gradient(95deg, rgba(0, 255, 255, 0.2), rgba(138, 43, 226, 0.2));
            color: #00FFFF;
            border: 1px solid rgba(0, 255, 255, 0.5);
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            margin-bottom: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.12);
        }
        .add-resource-btn:hover {
            background: rgba(0, 255, 255, 0.35);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .generate-btn, .save-btn {
            background: linear-gradient(135deg, #0b2b5c, #1e4880);
            border: 1px solid rgba(0, 255, 255, 0.4);
            padding: 14px 38px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.15);
        }
        .save-btn {
            background: linear-gradient(135deg, rgba(0, 200, 100, 0.3), rgba(0, 150, 80, 0.3));
            border-color: rgba(0, 255, 130, 0.5);
            margin-right: 16px;
        }
        .save-btn:hover, .generate-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 0 35px rgba(0, 255, 255, 0.25);
        }

        .toast-msg {

        /* 解锁栏 */
        .unlock-bar {
            background: rgba(255, 255, 0, 0.05);
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;

        .unlock-status { font-size: 0.85rem; font-weight: 500; color: #FFD700; }
        .unlock-input { display: flex; gap: 10px; align-items: center; }

            padding: 6px 12px;

            background: rgba(15,20,40,0.8); 
            color: #E0E6F0; 
        }

            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(138, 43, 226, 0.2));

            border: 1px solid rgba(0, 255, 255, 0.5); 
            padding: 6px 16px; 
            border-radius: 40px; 
            cursor: pointer; 
        }

        /* 加密复制弹窗 */
        .modal-unlock {
            display: none;
            position: fixed;
            z-index: 1100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 20, 0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(5px);

        .modal-unlock.active {
            display: flex;
        }

        .modal-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 28px 32px;
            text-align: center;

            width: 90%;

        .modal-card img {
            max-width: 180px;
            margin-bottom: 16px;
            border-radius: 24px;
            background: white;
            padding: 8px;
        }

        .modal-card input {
            width: 90%;
            padding: 12px;
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 255, 0.5);

            text-align: center;
            background: rgba(15,20,40,0.8);
            color: #E0E6F0;

        .modal-card button {

            border-radius: 40px;
            color: #00FFFF;
            font-weight: bold;
            margin: 5px;
            cursor: pointer;
            transition: 0.2s;

        .modal-card button:hover {

function showToast(msg, duration) {
    duration = duration || 2200;
    var t = document.getElementById('toastMsg');
    if (!t) return;
    t.innerText = msg;
    t.style.opacity = '1';
    setTimeout(function() { t.style.opacity = '0'; }, duration);
}

async function copyToClipboard(text) {
    try {
        await navigator.clipboard.writeText(text);
    } catch (err) {
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
    }
}

function handleCopyLink(link, encrypted, password) {
